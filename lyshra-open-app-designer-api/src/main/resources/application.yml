server:
  port: 8080

spring:
  application:
    name: lyshra-openapp-designer
  webflux:
    static-path-pattern: /static/**

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    display-request-duration: true
    show-extensions: true
    show-common-extensions: true
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
  packages-to-scan: com.lyshra.open.app.designer.controller
  paths-to-match: /api/**

app:
  security:
    jwt:
      secret: lyshra-openapp-designer-jwt-secret-key-change-this-in-production
      expiration-hours: 24

logging:
  level:
    root: INFO
    com.lyshra.open.app.designer: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
