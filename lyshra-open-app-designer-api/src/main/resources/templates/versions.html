<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Version Management - Lyshra OpenApp')}"></head>
<body class="d-flex flex-column min-vh-100">
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="flex-grow-1">
        <div class="container-fluid py-4">
            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/workflows">Workflows</a></li>
                    <li class="breadcrumb-item active" id="workflowBreadcrumb">Version Management</li>
                </ol>
            </nav>

            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1><i class="bi bi-layers"></i> Version Management</h1>
                    <p class="text-muted mb-0" id="workflowInfo">Loading workflow details...</p>
                </div>
                <div class="d-flex gap-2">
                    <a href="/workflows" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Back to Workflows
                    </a>
                    <a id="btnOpenDesigner" href="#" class="btn btn-primary">
                        <i class="bi bi-pencil"></i> Open in Designer
                    </a>
                </div>
            </div>

            <!-- Version Manager Container -->
            <div id="versionManagerContainer">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-3 text-muted">Loading versions...</p>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
    <script th:src="@{/static/js/version-manager.js}"></script>
    <script>
        let workflowId = null;
        let workflowData = null;

        async function initVersionManager() {
            // Get workflow ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            workflowId = urlParams.get('id');

            if (!workflowId) {
                document.getElementById('versionManagerContainer').innerHTML = `
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle"></i> No workflow ID provided.
                        <a href="/workflows">Return to workflows list</a>
                    </div>
                `;
                return;
            }

            try {
                // Load workflow details
                workflowData = await api.getWorkflow(workflowId);

                // Update header
                document.getElementById('workflowBreadcrumb').textContent = workflowData.name;
                document.getElementById('workflowInfo').innerHTML = `
                    <strong>${escapeHtml(workflowData.name)}</strong>
                    <span class="badge ${getStatusBadgeClass(workflowData.lifecycleState)} ms-2">${workflowData.lifecycleState}</span>
                    <span class="text-muted ms-2">${workflowData.organization}/${workflowData.module}</span>
                `;
                document.getElementById('btnOpenDesigner').href = `/designer?id=${workflowId}`;

                // Initialize version manager
                versionManager = new VersionManager({
                    workflowId: workflowId,
                    workflowName: workflowData.name,
                    onVersionChange: () => {
                        // Reload workflow data when version changes
                        loadWorkflowData();
                    }
                });

                await versionManager.init(
                    document.getElementById('versionManagerContainer'),
                    workflowId
                );
            } catch (error) {
                console.error('Failed to load workflow:', error);
                document.getElementById('versionManagerContainer').innerHTML = `
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle"></i> Failed to load workflow: ${error.message}
                        <a href="/workflows" class="ms-2">Return to workflows list</a>
                    </div>
                `;
            }
        }

        async function loadWorkflowData() {
            try {
                workflowData = await api.getWorkflow(workflowId);
                document.getElementById('workflowInfo').innerHTML = `
                    <strong>${escapeHtml(workflowData.name)}</strong>
                    <span class="badge ${getStatusBadgeClass(workflowData.lifecycleState)} ms-2">${workflowData.lifecycleState}</span>
                    <span class="text-muted ms-2">${workflowData.organization}/${workflowData.module}</span>
                `;
            } catch (error) {
                console.error('Failed to reload workflow:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', initVersionManager);
    </script>
</body>
</html>
