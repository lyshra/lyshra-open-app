<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Execute Workflow - Lyshra OpenApp')}"></head>
<body class="d-flex flex-column min-vh-100">
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="flex-grow-1">
        <div class="container py-4">
            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/workflows">Workflows</a></li>
                    <li class="breadcrumb-item"><a href="/executions">Executions</a></li>
                    <li class="breadcrumb-item active">Execute Workflow</li>
                </ol>
            </nav>

            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1><i class="bi bi-play-circle"></i> Execute Workflow</h1>
                    <p class="text-muted mb-0">Manually trigger a workflow execution with custom input</p>
                </div>
                <a href="/executions" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Back to Executions
                </a>
            </div>

            <!-- Execution Trigger Container -->
            <div id="executionTriggerContainer">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-3 text-muted">Loading workflows...</p>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
    <script th:src="@{/static/js/execution-trigger.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Check for pre-selected workflow from URL
            const urlParams = new URLSearchParams(window.location.search);
            const workflowId = urlParams.get('workflow');

            executionTrigger = new ExecutionTrigger({
                onExecutionStarted: (execution) => {
                    console.log('Execution started:', execution);
                }
            });

            await executionTrigger.init(document.getElementById('executionTriggerContainer'));

            // Pre-select workflow if provided in URL
            if (workflowId) {
                const select = document.getElementById('selectWorkflow');
                if (select) {
                    select.value = workflowId;
                    select.dispatchEvent(new Event('change'));
                }
            }
        });
    </script>
</body>
</html>
