<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Executions Dashboard - Lyshra OpenApp')}"></head>
<body class="d-flex flex-column min-vh-100">
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="flex-grow-1">
        <div class="container-fluid py-4">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1><i class="bi bi-speedometer2"></i> Execution Dashboard</h1>
                    <p class="text-muted mb-0">Monitor and manage workflow executions in real-time</p>
                </div>
                <a href="/execute" class="btn btn-success">
                    <i class="bi bi-play-fill"></i> Execute Workflow
                </a>
            </div>

            <!-- Dashboard Container -->
            <div id="dashboardContainer">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-3 text-muted">Loading dashboard...</p>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
    <script th:src="@{/static/js/execution-dashboard.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Check for specific execution ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const executionId = urlParams.get('id');

            executionDashboard = new ExecutionDashboard({
                refreshRate: 5000,
                pageSize: 20
            });

            await executionDashboard.init(document.getElementById('dashboardContainer'));

            // If execution ID provided, show its details
            if (executionId) {
                executionDashboard.showDetails(executionId);
            }
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (executionDashboard) {
                executionDashboard.destroy();
            }
        });
    </script>
</body>
</html>
