<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Executions - Lyshra OpenApp')}"></head>
<body class="d-flex flex-column min-vh-100">
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="flex-grow-1">
        <div class="container-fluid py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1><i class="bi bi-play-circle"></i> Executions</h1>
                    <p class="text-muted mb-0">Monitor workflow executions in real-time</p>
                </div>
                <div class="d-flex align-items-center gap-3">
                    <div class="form-check form-switch mb-0">
                        <input class="form-check-input" type="checkbox" id="autoRefresh" checked>
                        <label class="form-check-label" for="autoRefresh">Auto-refresh</label>
                    </div>
                    <a href="/execute" class="btn btn-success">
                        <i class="bi bi-play-fill"></i> Execute Workflow
                    </a>
                </div>
            </div>

            <!-- Statistics -->
            <div class="row mb-4">
                <div class="col-md-2">
                    <div class="card text-center">
                        <div class="card-body py-2">
                            <h4 class="mb-0" id="statTotal">-</h4>
                            <small class="text-muted">Total</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="card text-center border-primary">
                        <div class="card-body py-2">
                            <h4 class="mb-0 text-primary" id="statRunning">-</h4>
                            <small class="text-muted">Running</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="card text-center border-success">
                        <div class="card-body py-2">
                            <h4 class="mb-0 text-success" id="statCompleted">-</h4>
                            <small class="text-muted">Completed</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="card text-center border-danger">
                        <div class="card-body py-2">
                            <h4 class="mb-0 text-danger" id="statFailed">-</h4>
                            <small class="text-muted">Failed</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="card text-center border-warning">
                        <div class="card-body py-2">
                            <h4 class="mb-0 text-warning" id="statCancelled">-</h4>
                            <small class="text-muted">Cancelled</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="card text-center">
                        <div class="card-body py-2">
                            <h4 class="mb-0" id="statSuccessRate">-</h4>
                            <small class="text-muted">Success Rate</small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div class="card mb-4">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <select class="form-select" id="filterStatus">
                                <option value="">All Statuses</option>
                                <option value="PENDING">Pending</option>
                                <option value="RUNNING">Running</option>
                                <option value="COMPLETED">Completed</option>
                                <option value="FAILED">Failed</option>
                                <option value="CANCELLED">Cancelled</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" id="filterWorkflow">
                                <option value="">All Workflows</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <input type="datetime-local" class="form-control" id="filterStartTime"
                                   placeholder="Start Time">
                        </div>
                        <div class="col-md-3">
                            <input type="datetime-local" class="form-control" id="filterEndTime"
                                   placeholder="End Time">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Executions Table -->
            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Workflow</th>
                                <th>Version</th>
                                <th>Status</th>
                                <th>Started</th>
                                <th>Duration</th>
                                <th>Triggered By</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="executionTable">
                            <tr>
                                <td colspan="8" class="text-center py-4">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Execution Detail Modal -->
    <div class="modal fade" id="executionModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-info-circle"></i> Execution Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="executionDetails">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-warning" id="btnCancelExecution" style="display: none;">
                        <i class="bi bi-stop-circle"></i> Cancel
                    </button>
                    <button type="button" class="btn btn-primary" id="btnRetryExecution" style="display: none;">
                        <i class="bi bi-arrow-repeat"></i> Retry
                    </button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
    <script th:src="@{/static/js/executions.js}"></script>
</body>
</html>
