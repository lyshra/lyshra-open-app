<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Workflow Designer - Lyshra OpenApp')}"></head>
<body class="d-flex flex-column vh-100">
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="flex-grow-1 d-flex overflow-hidden">
        <!-- Processor Palette -->
        <aside class="bg-light border-end" style="width: 280px; overflow-y: auto;">
            <div class="p-3">
                <h6 class="text-uppercase text-muted mb-3">
                    <i class="bi bi-puzzle"></i> Processors
                </h6>
                <input type="text" class="form-control form-control-sm mb-3"
                       id="processorSearch" placeholder="Search processors...">

                <div id="processorPalette">
                    <!-- Processor categories will be loaded here -->
                </div>
            </div>
        </aside>

        <!-- Main Designer Area -->
        <div class="flex-grow-1 d-flex flex-column">
            <!-- Toolbar -->
            <div class="bg-white border-bottom p-2 d-flex align-items-center gap-2">
                <div class="btn-group">
                    <button class="btn btn-outline-secondary btn-sm" id="btnNew" title="New Workflow">
                        <i class="bi bi-file-plus"></i>
                    </button>
                    <button class="btn btn-outline-secondary btn-sm" id="btnOpen" title="Open Workflow">
                        <i class="bi bi-folder-open"></i>
                    </button>
                    <button class="btn btn-outline-primary btn-sm" id="btnSave" title="Save">
                        <i class="bi bi-save"></i>
                    </button>
                </div>
                <div class="vr"></div>
                <div class="btn-group">
                    <button class="btn btn-outline-secondary btn-sm" id="btnUndo" title="Undo" disabled>
                        <i class="bi bi-arrow-counterclockwise"></i>
                    </button>
                    <button class="btn btn-outline-secondary btn-sm" id="btnRedo" title="Redo" disabled>
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                </div>
                <div class="vr"></div>
                <div class="btn-group">
                    <button class="btn btn-outline-secondary btn-sm" id="btnZoomIn" title="Zoom In">
                        <i class="bi bi-zoom-in"></i>
                    </button>
                    <button class="btn btn-outline-secondary btn-sm" id="btnZoomOut" title="Zoom Out">
                        <i class="bi bi-zoom-out"></i>
                    </button>
                    <button class="btn btn-outline-secondary btn-sm" id="btnFitView" title="Fit View">
                        <i class="bi bi-arrows-fullscreen"></i>
                    </button>
                </div>
                <div class="vr"></div>
                <button class="btn btn-outline-success btn-sm" id="btnValidate" title="Validate Workflow">
                    <i class="bi bi-check-circle"></i> Validate
                </button>
                <button class="btn btn-success btn-sm" id="btnExecute" title="Execute Workflow">
                    <i class="bi bi-play-fill"></i> Execute
                </button>
                <div class="ms-auto d-flex align-items-center gap-2">
                    <span class="badge bg-secondary" id="workflowStatus">Draft</span>
                    <span class="text-muted" id="workflowName">Untitled Workflow</span>
                </div>
            </div>

            <!-- Canvas -->
            <div class="flex-grow-1 position-relative overflow-hidden bg-canvas" id="canvasContainer">
                <svg id="workflowCanvas" class="w-100 h-100">
                    <defs>
                        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                            <circle cx="1" cy="1" r="1" fill="#e0e0e0"/>
                        </pattern>
                        <marker id="arrowhead" markerWidth="10" markerHeight="7"
                                refX="9" refY="3.5" orient="auto">
                            <polygon points="0 0, 10 3.5, 0 7" fill="#6c757d"/>
                        </marker>
                        <marker id="arrowhead-error" markerWidth="10" markerHeight="7"
                                refX="9" refY="3.5" orient="auto">
                            <polygon points="0 0, 10 3.5, 0 7" fill="#dc3545"/>
                        </marker>
                    </defs>
                    <rect width="100%" height="100%" fill="url(#grid)"/>
                    <g id="connectionsLayer"></g>
                    <g id="stepsLayer"></g>
                </svg>

                <!-- Context Menu -->
                <div id="contextMenu" class="dropdown-menu" style="display: none; position: absolute;">
                    <a class="dropdown-item" href="#" id="ctxEditStep">
                        <i class="bi bi-pencil"></i> Edit Step
                    </a>
                    <a class="dropdown-item" href="#" id="ctxDeleteStep">
                        <i class="bi bi-trash"></i> Delete Step
                    </a>
                    <a class="dropdown-item" href="#" id="ctxSetStartStep">
                        <i class="bi bi-flag"></i> Set as Start Step
                    </a>
                    <div class="dropdown-divider"></div>
                    <a class="dropdown-item" href="#" id="ctxDuplicateStep">
                        <i class="bi bi-copy"></i> Duplicate
                    </a>
                </div>

                <!-- Zoom Controls -->
                <div class="zoom-controls">
                    <button class="btn btn-sm btn-outline-secondary" id="btnZoomOutCanvas" title="Zoom Out">
                        <i class="bi bi-dash"></i>
                    </button>
                    <span id="zoomIndicator">100%</span>
                    <button class="btn btn-sm btn-outline-secondary" id="btnZoomInCanvas" title="Zoom In">
                        <i class="bi bi-plus"></i>
                    </button>
                    <div class="vr mx-1"></div>
                    <button class="btn btn-sm btn-outline-secondary btn-snap-grid active" id="btnSnapGrid" title="Snap to Grid">
                        <i class="bi bi-grid-3x3"></i>
                    </button>
                </div>

                <!-- Minimap -->
                <div id="minimap">
                    <div class="minimap-header">Overview</div>
                    <canvas></canvas>
                </div>

                <!-- Keyboard Hints -->
                <div class="keyboard-hints d-none d-lg-block">
                    <kbd>Space</kbd> + Drag to pan &nbsp;|&nbsp;
                    <kbd>Scroll</kbd> to zoom &nbsp;|&nbsp;
                    <kbd>Del</kbd> to delete
                </div>
            </div>
        </div>

        <!-- Properties Panel -->
        <aside class="bg-light border-start" style="width: 320px; overflow-y: auto;">
            <div class="p-3">
                <div id="propertiesPanel">
                    <div class="text-center text-muted py-5">
                        <i class="bi bi-cursor display-4"></i>
                        <p class="mt-3">Select a step to view its properties</p>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <!-- Modals -->
    <div class="modal fade" id="workflowModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="workflowModalTitle">Workflow Properties</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="workflowForm">
                        <div class="mb-3">
                            <label for="wfName" class="form-label">Name *</label>
                            <input type="text" class="form-control" id="wfName" required>
                        </div>
                        <div class="mb-3">
                            <label for="wfDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="wfDescription" rows="3"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="wfOrganization" class="form-label">Organization *</label>
                                <input type="text" class="form-control" id="wfOrganization" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="wfModule" class="form-label">Module *</label>
                                <input type="text" class="form-control" id="wfModule" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="wfCategory" class="form-label">Category</label>
                            <input type="text" class="form-control" id="wfCategory">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="btnSaveWorkflow">Save</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="stepModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Step Configuration</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="stepModalBody">
                    <!-- Step configuration form will be loaded here -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="btnSaveStep">Save Step</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="validationModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-check-circle"></i> Validation Results</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="validationResults">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
    <script th:src="@{/static/js/designer.js}"></script>
</body>
</html>
